name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Node.js 20 actions are deprecated as of 2026-06-16.
      # Allow them until all third-party actions ship Node.js 24 support.
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Determine version
        id: version
        run: |
          BASE="1.0"
          BUILD="${{ github.run_number }}"
          echo "VERSION=v${BASE}.${BUILD}" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=${BASE}.${BUILD}" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=${BUILD}" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: gradle :app:assembleRelease
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/PeacePiece-${{ steps.version.outputs.VERSION }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "PeacePiece ${{ steps.version.outputs.VERSION }}"
          files: "app/build/outputs/apk/release/PeacePiece-${{ steps.version.outputs.VERSION }}.apk"
          generate_release_notes: true
          draft: false
          prerelease: false
